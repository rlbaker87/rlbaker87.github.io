<!-- Emergency Management | Active Shooter Scenario -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Scenario: Active Shooter Response</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --white:#FFFFFF;
      --bg-light:#F8F9FA;
      --bg-selected:#E8F7F6;
      --text-dark:#343A40;
      --text-mid:#6C757D;
      --border:#E9ECEF;
      --navy:#1B365D;
      --teal:#00B4A6;
      --teal-dark:#008B7F;
      --orange:#F07B3F;
      --green:#2E7D32;
      --red:#C62828;
      --neutral:#455A64;
      --font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    }
    @media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
    body{background:transparent;font-family:var(--font);font-size:17px;line-height:1.6;color:var(--text-dark)}
    #app{width:100%;max-width:960px;margin:0 auto}

    /* PROGRESS */
    .progress-wrap{background:var(--border);height:4px;border-radius:2px}
    .progress-fill{background:var(--teal);height:4px;border-radius:2px;transition:width 0.4s ease}
    .progress-label{font-size:14px;color:var(--text-mid);text-align:right;padding:4px 0 12px}

    /* SPLIT */
    .split{
      display:grid;grid-template-columns:1fr 1fr;
      border:1px solid var(--border);border-radius:6px;
      overflow:hidden;min-height:420px
    }
    .panel-left{
      background:var(--navy);color:var(--white);
      padding:32px 28px;display:flex;flex-direction:column;gap:16px
    }
    .panel-right{
      background:var(--white);
      padding:32px 28px;display:flex;flex-direction:column;gap:18px
    }
    .step-badge{
      background:rgba(255,255,255,0.15);color:var(--white);
      font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
      padding:4px 10px;border-radius:3px;width:fit-content;display:inline-block
    }
    .panel-left h2{font-size:24px;font-weight:700;color:var(--white)}
    .scenario-text{font-size:17px;line-height:1.65;color:rgba(255,255,255,0.92)}
    .question-text{font-size:17px;font-weight:700;color:var(--text-dark);line-height:1.4;display:block;margin-bottom:4px}
    .help-text{font-size:14px;color:var(--text-mid)}

    /* INFO PANEL (Step 5) */
    .panel-info{
      background:var(--white);
      padding:32px 28px;display:flex;flex-direction:column;gap:16px;
      justify-content:center;
    }
    .panel-info h3{font-size:17px;font-weight:700;color:var(--navy)}
    .panel-info p{font-size:17px;color:var(--text-dark);line-height:1.65}
    .kit-badge{
      background:var(--bg-light);border-left:4px solid var(--teal);
      border-radius:0 4px 4px 0;padding:14px 16px;
      font-size:17px;color:var(--text-dark);line-height:1.55
    }

    /* OPTIONS */
    .options{display:flex;flex-direction:column;gap:10px;border:none;padding:0;margin:0}
    .option-btn{
      display:flex;align-items:flex-start;gap:12px;
      background:var(--bg-light);border:2px solid var(--border);
      border-radius:5px;padding:12px 14px;cursor:pointer;text-align:left;
      font-family:var(--font);font-size:17px;color:var(--text-dark);
      line-height:1.5;min-height:44px;width:100%;
      transition:border-color 0.15s,background 0.15s
    }
    .option-btn:hover:not(:disabled){border-color:var(--teal);background:var(--bg-selected)}
    .option-btn:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
    .option-btn[aria-checked="true"]{border-color:var(--navy);background:var(--bg-selected)}
    .option-btn[aria-checked="true"] .option-letter{background:var(--navy);color:var(--white)}
    .option-btn:disabled{cursor:default}
    .option-btn:disabled:hover{border-color:var(--border);background:var(--bg-light)}
    .option-letter{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:24px;height:24px;border-radius:50%;
      background:var(--border);color:var(--text-dark);
      font-size:12px;font-weight:700;flex-shrink:0
    }

    /* CONTINUE BUTTON */
    .btn-continue{
      margin-top:auto;align-self:flex-end;
      background:var(--teal);color:var(--white);
      border:none;border-radius:5px;padding:10px 24px;
      font-family:var(--font);font-size:17px;font-weight:700;
      cursor:pointer;min-height:44px;
      transition:background 0.15s
    }
    .btn-continue:hover{background:var(--teal-dark)}
    .btn-continue:focus-visible{outline:3px solid var(--navy);outline-offset:2px}
    .btn-continue:disabled{opacity:.55;cursor:default}

    /* END SCREEN */
    #end-screen{display:none;border:1px solid var(--border);border-radius:6px;overflow:hidden}
    #end-screen.show{display:block}
    .end-header{background:var(--navy);color:var(--white);padding:24px 32px;display:flex;flex-direction:column;gap:8px}
    .end-header h2{font-size:24px;font-weight:700;color:var(--white)}
    .end-body{background:var(--white);padding:28px 32px;display:flex;flex-direction:column;gap:24px}

    /* SCORE ROW */
    .score-row{
      display:flex;align-items:center;gap:16px;
      background:var(--bg-light);border:1px solid var(--border);
      border-radius:6px;padding:16px 20px
    }
    .score-circle{
      width:64px;height:64px;border-radius:50%;flex-shrink:0;
      background:var(--teal);color:var(--white);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-weight:700
    }
    .score-circle .score-num{font-size:22px;line-height:1}
    .score-circle .score-denom{font-size:11px;opacity:.8}
    .score-text strong{font-size:18px;display:block;margin-bottom:4px}
    .score-text p{font-size:17px;color:var(--text-mid);margin:0}

    /* FEEDBACK SECTIONS */
    .fb-section{display:flex;flex-direction:column;gap:10px}
    .fb-section h3{
      font-size:13px;font-weight:700;text-transform:uppercase;
      letter-spacing:0.07em;margin-bottom:2px
    }
    .fb-section.positive h3{color:var(--green)}
    .fb-section.caution h3{color:var(--red)}
    .fb-section.context h3{color:var(--neutral)}

    .bullet{
      background:var(--bg-light);border:1px solid var(--border);
      border-radius:5px;padding:12px 14px;
      font-size:17px;line-height:1.55;color:var(--text-dark)
    }
    .bullet.good{border-left:4px solid var(--green)}
    .bullet.risk{border-left:4px solid var(--red)}

    .why-box{
      background:var(--bg-light);border:1px solid var(--border);
      border-left:4px solid var(--neutral);border-radius:5px;
      padding:14px 16px;font-size:17px;line-height:1.6;color:var(--text-dark)
    }
    .section-note{font-size:17px;color:var(--text-mid);line-height:1.55}

    /* END ACTIONS ROW */
    .end-actions{
      display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap
    }
    .end-actions-note{font-size:17px;color:var(--text-dark);line-height:1.5;flex:1}
    .btn-try-again{
      background:var(--white);color:var(--navy);
      border:2px solid var(--navy);border-radius:5px;
      padding:10px 24px;font-family:var(--font);font-size:17px;
      font-weight:700;cursor:pointer;min-height:44px;flex-shrink:0;
      transition:background 0.15s
    }
    .btn-try-again:hover{background:var(--bg-selected)}
    .btn-try-again:focus-visible{outline:3px solid var(--teal);outline-offset:2px}

    @media(max-width:680px){.split{grid-template-columns:1fr}}
  </style>
</head>

<body>
  <div id="app" role="main">
    <div class="progress-wrap" role="progressbar"
      aria-valuemin="1" aria-valuemax="5"
      aria-valuenow="1" aria-valuetext="Step 1 of 5">
      <div class="progress-fill" id="pfill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="plabel" aria-live="polite">Step 1 of 5</div>

    <div id="sc"></div>
    <div id="end-screen" role="region" aria-label="Results" aria-live="polite"></div>
  </div>

  <script>
    const steps = [
      {
        type: 'MC',
        badge: 'Scenario 1 of 4',
        scenarioTitle: 'You Hear Gunshots',
        scenarioText: 'You hear gunshots nearby. You are close to an exit and start moving toward it. As you reach the hallway, you see a patient with a mobility limitation who cannot move quickly on their own.',
        question: 'What do you do?',
        helpText: 'Select one answer.',
        options: [
          { letter: 'A', text: 'Continue toward the exit to get yourself to safety', correct: true },
          { letter: 'B', text: 'Stop to assist the patient if you believe you can do so safely', correct: true },
          { letter: 'C', text: 'Move closer to locate the shooter', correct: false },
          { letter: 'D', text: 'Stay in the hallway to watch what happens', correct: false }
        ],
        correctFeedback: 'Run or assist — both are recognized responses. Getting to safety quickly is the priority, and helping a patient is a personal decision when it can be done without additional risk.',
        incorrectFeedback: 'Moving toward the shooter or staying in an open area significantly increases your risk. The priority is to get to safety or create safety where you are.'
      },
      {
        type: 'MC',
        badge: 'Scenario 2 of 4',
        scenarioTitle: 'Exit Is Blocked',
        scenarioText: 'As you move further down the hallway, you realize the exit is blocked. You see the shooter approaching from a distance. There is a nearby room with a door that can be closed and locked.',
        question: 'What should you do next?',
        helpText: 'Select one answer.',
        options: [
          { letter: 'A', text: 'Try to run past the shooter toward another exit', correct: false },
          { letter: 'B', text: 'Open the door and look out to track the shooter\'s movement', correct: false },
          { letter: 'C', text: 'Enter the room, close and lock the door, turn off lights, stay low, silence phones, and barricade if possible', correct: true },
          { letter: 'D', text: 'Stand still in the hallway and wait for instructions', correct: false }
        ],
        correctFeedback: 'Hiding is the right call when escape is not possible. Locking the door, reducing visibility, silencing phones, and staying low all help deny access and avoid detection.',
        incorrectFeedback: 'Running past the shooter, staying in the open, or drawing attention from a doorway all increase your exposure. When exit is blocked, your goal is to create a barrier and remain out of sight.'
      },
      {
        type: 'MC',
        badge: 'Scenario 3 of 4',
        scenarioTitle: 'Shooter Attempts Entry',
        scenarioText: 'The shooter attempts to force entry into the room. There is no way to escape, and your life is in immediate danger. You notice several heavy objects nearby.',
        question: 'What action best reflects last resort response?',
        helpText: 'Select one answer.',
        options: [
          { letter: 'A', text: 'Hide quietly and hope the shooter leaves', correct: false },
          { letter: 'B', text: 'Call out to the shooter to distract them', correct: false },
          { letter: 'C', text: 'Prepare to defend yourself using available objects to disrupt or incapacitate the shooter', correct: true },
          { letter: 'D', text: 'Unlock the door and attempt to run past the shooter', correct: false }
        ],
        correctFeedback: 'When escape is impossible and life is in immediate danger, actively disrupting the threat is a recognized last resort. Acting with commitment and using available items gives you the best chance.',
        incorrectFeedback: 'Passive options like waiting or unlocking the door remove your ability to control the situation when it is most critical. Last resort means taking decisive action when no other option exists.'
      },
      {
        type: 'MC',
        badge: 'Scenario 4 of 4',
        scenarioTitle: 'Law Enforcement on Scene',
        scenarioText: 'The shooter is no longer active. Law enforcement enters the area and begins issuing loud, direct commands as they secure the scene.',
        question: 'What should you do when officers arrive?',
        helpText: 'Select one answer.',
        options: [
          { letter: 'A', text: 'Run toward officers to explain what you saw', correct: false },
          { letter: 'B', text: 'Follow instructions, keep hands visible, remain calm, and move only when directed', correct: true },
          { letter: 'C', text: 'Record video on your phone', correct: false },
          { letter: 'D', text: 'Point toward where you last saw the shooter and shout directions', correct: false }
        ],
        correctFeedback: 'Hands visible, calm, and responsive to direction — this is exactly right. Officers are securing an active scene and need to identify threats quickly. Your calm cooperation supports a safe resolution.',
        incorrectFeedback: 'Running toward officers, filming, or shouting can appear threatening or disrupt the response. Follow their commands and wait to provide information until the scene is secure.'
      },
      {
        type: 'info',
        badge: 'After the Threat',
        scenarioTitle: 'Stop the Bleed Kits',
        scenarioText: 'After a threat is stopped and when it is safe to do so, team members may be asked to assist with the wounded. Stop the Bleed kits are available in many facilities and are intended to help control life-threatening bleeding until additional help arrives.'
      }
    ];

    const WHY_THIS_MATTERS = 'Active shooter response in healthcare settings is supported by emergency operations that may involve an Incident Command structure. Team members support response by making safety-focused decisions, protecting patients when possible, and following official direction once responders arrive.';
    const CORRECT_NOTE = 'These actions reflect the Run, Hide, Fight framework and support a safe, coordinated response.';

    let cur = 0;
    const answers = [];
    const sc = document.getElementById('sc');
    const es = document.getElementById('end-screen');

    function focusSilently(el) {
      el.style.outline = 'none';
      el.focus();
      el.addEventListener('blur', () => el.style.outline = '', { once: true });
    }

    function setProgress(i) {
      const tot = steps.length;
      const pct = Math.round((i / tot) * 100);
      document.getElementById('pfill').style.width = pct + '%';
      const pb = document.querySelector('.progress-wrap');
      pb.setAttribute('aria-valuenow', String(i + 1));
      pb.setAttribute('aria-valuemax', String(tot));
      pb.setAttribute('aria-valuetext', `Step ${i + 1} of ${tot}`);
      document.getElementById('plabel').textContent = `Step ${i + 1} of ${tot}`;
    }

    function render(i) {
      const s = steps[i];
      setProgress(i);

      if (s.type === 'info') {
        sc.innerHTML = `
          <div class="split">
            <section class="panel-left" aria-label="Information">
              <span class="step-badge">${s.badge}</span>
              <h2 tabindex="-1" id="sh">${s.scenarioTitle}</h2>
              <p class="scenario-text">${s.scenarioText}</p>
            </section>
            <div class="panel-info">
              <h3>Before You Go</h3>
              <p>Knowing where emergency resources are located is part of being prepared. Stop the Bleed training helps team members take action in the critical minutes before emergency services arrive.</p>
              <div class="kit-badge"><strong>Action Item:</strong> Ask your leader where Stop the Bleed kits are located in your work area.</div>
              <button class="btn-continue" id="bc" type="button" style="align-self:flex-end;margin-top:auto">View Your Results</button>
            </div>
          </div>
        `;
        focusSilently(document.getElementById('sh'));
        document.getElementById('bc').addEventListener('click', showEnd, { once: true });
        return;
      }

      const optsHTML = s.options.map(o => `
        <button class="option-btn" type="button"
          data-letter="${o.letter}" data-correct="${o.correct}"
          role="radio" aria-checked="false">
          <span class="option-letter" aria-hidden="true">${o.letter}</span>
          <span>${o.text}</span>
        </button>
      `).join('');

      sc.innerHTML = `
        <div class="split">
          <section class="panel-left" aria-label="Scenario">
            <span class="step-badge">${s.badge}</span>
            <h2 tabindex="-1" id="sh">${s.scenarioTitle}</h2>
            <p class="scenario-text">${s.scenarioText}</p>
          </section>
          <section class="panel-right" aria-label="Question">
            <fieldset class="options" role="radiogroup" aria-labelledby="ql" aria-describedby="help">
              <legend class="question-text" id="ql">${s.question}</legend>
              <p class="help-text" id="help">${s.helpText}</p>
              ${optsHTML}
            </fieldset>
            <button class="btn-continue" id="bc" type="button" disabled>Continue</button>
          </section>
        </div>
      `;

      focusSilently(document.getElementById('sh'));

      const btns = Array.from(sc.querySelectorAll('.option-btn'));
      const bc = document.getElementById('bc');

      btns.forEach(btn => {
        btn.addEventListener('click', () => {
          btns.forEach(b => { b.setAttribute('aria-checked', 'false'); b.disabled = true; });
          btn.setAttribute('aria-checked', 'true');
          btn.disabled = false;
          bc.disabled = false;

          bc.addEventListener('click', () => {
            btns.forEach(b => b.disabled = true);
            const ok = btn.dataset.correct === 'true';
            answers.push({ index: i, correct: ok });
            cur++;
            render(cur);
          }, { once: true });
        }, { once: true });
      });
    }

    function showEnd() {
      sc.style.display = 'none';
      document.querySelector('.progress-wrap').style.display = 'none';
      document.querySelector('.progress-label').style.display = 'none';

      const questionAnswers = answers.filter(a => steps[a.index].type !== 'info');
      const tot = questionAnswers.length;
      const okCount = questionAnswers.filter(a => a.correct).length;

      const goodBullets = questionAnswers.filter(a => a.correct)
        .map(a => `<div class="bullet good">${steps[a.index].correctFeedback}</div>`).join('');

      const riskBullets = questionAnswers.filter(a => !a.correct)
        .map(a => `<div class="bullet risk">${steps[a.index].incorrectFeedback}</div>`).join('');

      const riskSection = riskBullets ? `
        <div class="fb-section caution">
          <h3>What Could Increase Risk</h3>
          ${riskBullets}
        </div>` : '';

      es.innerHTML = `
        <div class="end-header">
          <span class="step-badge">Activity Complete</span>
          <h2 tabindex="-1" id="eh">Emergency Scenario: Active Shooter — Your Results</h2>
        </div>
        <div class="end-body">

          <div class="score-row" role="status" aria-label="${okCount} of ${tot} correct">
            <div class="score-circle" aria-hidden="true">
              <span class="score-num">${okCount}</span>
              <span class="score-denom">/ ${tot}</span>
            </div>
            <div class="score-text">
              <strong>${okCount === tot ? 'All correct.' : okCount + ' of ' + tot + ' correct.'}</strong>
              <p>Review the feedback below to reinforce what you learned.</p>
            </div>
          </div>

          ${goodBullets ? `
          <div class="fb-section positive">
            <h3>What You Did Right</h3>
            ${goodBullets}
            <p class="section-note">${CORRECT_NOTE}</p>
          </div>` : ''}

          ${riskSection}

          <div class="fb-section context">
            <h3>Why This Matters</h3>
            <div class="why-box">${WHY_THIS_MATTERS}</div>
          </div>

          <div class="end-actions">
            <p class="end-actions-note">Review your results above. Click "Try Again" to work through the scenario a second time.</p>
            <button class="btn-try-again" id="btr">Try Again</button>
          </div>

        </div>
      `;

      es.classList.add('show');
      focusSilently(document.getElementById('eh'));
      try { window.parent.postMessage({ type: 'complete' }, '*'); } catch(e) {}

      document.getElementById('btr').addEventListener('click', () => {
        cur = 0;
        answers.length = 0;
        es.classList.remove('show');
        es.innerHTML = '';
        sc.style.display = '';
        document.querySelector('.progress-wrap').style.display = '';
        document.querySelector('.progress-label').style.display = '';
        // Intro screen
    function renderIntro() {
        const pfill = document.getElementById('pfill');
        const plabel = document.getElementById('plabel');
        const pw = document.querySelector('.progress-wrap');
        pw.style.display = 'none';
        plabel.style.display = 'none';

        sc.innerHTML = `
            <div style="
                background:#1B365D;
                border-radius:6px;
                padding:56px 48px;
                display:flex;
                flex-direction:column;
                align-items:flex-start;
                gap:24px;
                min-height:420px;
                justify-content:center;
            ">
                <span style="
                    background:rgba(0,180,166,0.3);
                    color:#FFFFFF;
                    font-size:11px;
                    font-weight:700;
                    letter-spacing:0.1em;
                    text-transform:uppercase;
                    padding:4px 12px;
                    border-radius:3px;
                    display:inline-block;
                ">Scenario Practice</span>

                <h2 style="
                    color:#FFFFFF;
                    font-size:28px;
                    font-weight:700;
                    line-height:1.25;
                    max-width:600px;
                    margin:0;
                ">Active Shooter Response</h2>

                <p style="
                    color:rgba(255,255,255,0.88);
                    font-size:17px;
                    line-height:1.75;
                    max-width:620px;
                    margin:0;
                ">You will work through four realistic decision points based on a single unfolding event. Read each situation carefully and select your response. Feedback is held until all decisions are made. At the end, you will see a full summary of what you did right, what could increase risk, and why it matters.</p>

                <button id="btn-begin" type="button" style="
                    margin-top:8px;
                    background:#00B4A6;
                    color:#FFFFFF;
                    border:none;
                    border-radius:5px;
                    padding:12px 28px;
                    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
                    font-size:17px;
                    font-weight:700;
                    cursor:pointer;
                    min-height:44px;
                    transition:background 0.15s;
                ">Begin Scenario &#8594;</button>
            </div>
        `;

        document.getElementById('btn-begin').addEventListener('mouseover', function() {
            this.style.background = '#008B7F';
        });
        document.getElementById('btn-begin').addEventListener('mouseout', function() {
            this.style.background = '#00B4A6';
        });

        document.getElementById('btn-begin').addEventListener('click', function() {
            pw.style.display = '';
            plabel.style.display = '';
            render(0);
        }, { once: true });
    }

    renderIntro();
      });
    }

    // Intro screen
    function renderIntro() {
        const pfill = document.getElementById('pfill');
        const plabel = document.getElementById('plabel');
        const pw = document.querySelector('.progress-wrap');
        pw.style.display = 'none';
        plabel.style.display = 'none';

        sc.innerHTML = `
            <div style="
                background:#1B365D;
                border-radius:6px;
                padding:56px 48px;
                display:flex;
                flex-direction:column;
                align-items:flex-start;
                gap:24px;
                min-height:420px;
                justify-content:center;
            ">
                <span style="
                    background:rgba(0,180,166,0.3);
                    color:#FFFFFF;
                    font-size:11px;
                    font-weight:700;
                    letter-spacing:0.1em;
                    text-transform:uppercase;
                    padding:4px 12px;
                    border-radius:3px;
                    display:inline-block;
                ">Scenario Practice</span>

                <h2 style="
                    color:#FFFFFF;
                    font-size:28px;
                    font-weight:700;
                    line-height:1.25;
                    max-width:600px;
                    margin:0;
                ">Active Shooter Response</h2>

                <p style="
                    color:rgba(255,255,255,0.88);
                    font-size:17px;
                    line-height:1.75;
                    max-width:620px;
                    margin:0;
                ">You will work through four realistic decision points based on a single unfolding event. Read each situation carefully and select your response. Feedback is held until all decisions are made. At the end, you will see a full summary of what you did right, what could increase risk, and why it matters.</p>

                <button id="btn-begin" type="button" style="
                    margin-top:8px;
                    background:#00B4A6;
                    color:#FFFFFF;
                    border:none;
                    border-radius:5px;
                    padding:12px 28px;
                    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
                    font-size:17px;
                    font-weight:700;
                    cursor:pointer;
                    min-height:44px;
                    transition:background 0.15s;
                ">Begin Scenario &#8594;</button>
            </div>
        `;

        document.getElementById('btn-begin').addEventListener('mouseover', function() {
            this.style.background = '#008B7F';
        });
        document.getElementById('btn-begin').addEventListener('mouseout', function() {
            this.style.background = '#00B4A6';
        });

        document.getElementById('btn-begin').addEventListener('click', function() {
            pw.style.display = '';
            plabel.style.display = '';
            render(0);
        }, { once: true });
    }

    renderIntro();
  </script>
</body>
</html>
